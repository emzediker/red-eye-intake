<!DOCTYPE html>
<html>
  <head>
    <title>Red Eye Intake</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 500px;
        margin: 40px auto;
        line-height: 1.6;
      }

      h1 {
        text-align: center;
      }

      .step {
        display: none;
      }

      .active {
        display: block;
      }

      button {
        margin-top: 20px;
        padding: 10px;
        font-size: 16px;
        width: 100%;
        cursor: pointer;
      }

      .result {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        font-weight: bold;
      }

      .red {
        background-color: #ffe5e5;
        color: #cc0000;
      }

      .green {
        background-color: #e6ffe6;
        color: #006600;
      }
    </style>
  </head>

  <body>
    <h1>Red Eye Intake</h1>

    <!-- STEP 1 -->
    <div id="step1" class="step active">
      <p><strong>Step 1: Basic Symptoms</strong></p>

      <label><input type="checkbox" id="visionLoss" /> Decreased vision</label><br />
      <label><input type="checkbox" id="pain" /> Moderate to severe pain</label><br />
      <label><input type="checkbox" id="light" /> Light sensitivity</label><br />

      <button onclick="nextStep(2)">Next</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="step">
      <p><strong>Step 2: Risk Factors</strong></p>

      <label><input type="checkbox" id="trauma" /> Recent trauma</label><br />
      <label><input type="checkbox" id="chemical" /> Chemical exposure</label><br />
      <label><input type="checkbox" id="contactLensPain" /> Contact lens use with pain</label><br />

      <button onclick="nextStep(3)">Next</button>
    </div>

    <!-- STEP 3 -->
    <div id="step3" class="step">
      <p><strong>Step 3: Symptom Type</strong></p>

      <label><input type="radio" name="symptomType" value="itching" /> Itching</label><br />
      <label><input type="radio" name="symptomType" value="painful" /> Painful</label><br />

      <p><strong>Discharge:</strong></p>
      <label><input type="radio" name="discharge" value="watery" /> Watery</label><br />
      <label><input type="radio" name="discharge" value="thick" /> Thick / pus</label><br />

      <button onclick="runTriage()">Submit</button>
    </div>

    <!-- RESULT -->
    <div id="result"></div>

    <script>
      function nextStep(step) {
        document.querySelectorAll(".step").forEach((el) => el.classList.remove("active"));
        document.getElementById("step" + step).classList.add("active");
      }

      function runTriage() {
        const visionLoss = document.getElementById("visionLoss").checked;
        const pain = document.getElementById("pain").checked;
        const light = document.getElementById("light").checked;
        const trauma = document.getElementById("trauma").checked;
        const chemical = document.getElementById("chemical").checked;
        const contactLensPain = document.getElementById("contactLensPain").checked;

        const symptomType = document.querySelector('input[name="symptomType"]:checked')?.value;
        const discharge = document.querySelector('input[name="discharge"]:checked')?.value;

        const resultBox = document.getElementById("result");

        const highRisk =
          visionLoss || pain || light || trauma || chemical || contactLensPain;

        if (highRisk) {
          resultBox.className = "result red";
          resultBox.innerText =
            "🚫 Please seek in-person eye care as soon as possible.";
          return;
        }

        // Clinical logic layer
        if (symptomType === "itching" && discharge === "watery") {
          resultBox.className = "result green";
          resultBox.innerText =
            "✅ Likely allergic conjunctivitis. You may be a candidate for virtual care.";
        } else if (symptomType === "painful" && discharge === "thick") {
          resultBox.className = "result green";
          resultBox.innerText =
            "✅ Possible bacterial conjunctivitis. Virtual care may be appropriate.";
        } else {
          resultBox.className = "result red";
          resultBox.innerText =
            "⚠️ Your symptoms are unclear. In-person evaluation is recommended.";
        }
      }
    </script>
  </body>
</html>
