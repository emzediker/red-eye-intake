<!DOCTYPE html>
<html>
<head>
<title>Texas Virtual Eye Care – Red Eye & Stye</title>

<style>
body { font-family: Arial; max-width: 520px; margin: 40px auto; }
h1 { text-align:center; }
.subtitle { text-align:center; color:gray; margin-bottom:20px; }

.step { display:none; }
.active { display:block; }

.check-row {
  display:grid;
  grid-template-columns:20px auto;
  gap:6px;
  margin-bottom:6px;
}

textarea,input,select { width:100%; margin-bottom:12px; padding:8px; }
button { width:100%; padding:12px; margin-top:10px; }

.result { padding:15px; border-radius:8px; }
.green { background:#e6ffe6; }
.red { background:#ffe5e5; }

.card {
  border:1px solid #ccc;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  cursor:pointer;
}

.soap-section { margin-bottom:20px; }
.soap-title { font-weight:bold; border-bottom:1px solid #000; margin-bottom:6px; }
.print-container { max-width:700px; margin:auto; }
.signature { margin-top:40px; }
</style>
</head>

<body>

<h1>Texas Virtual Eye Care</h1>
<p class="subtitle">Telehealth for red eye & lid conditions (Texas only)</p>

<div id="app"></div>

<script>

const providers = {
  "Emily Zediker, OD": { npi: "1790349074" },
  "Sophia Brown, OD": { npi: "1750279949" }
};

let doctorName = "Emily Zediker, OD";
let currentIndex = null;
let sheetPatients = [];

const isProvider = new URLSearchParams(window.location.search).get("provider")==="1";
let patient={};

if(isProvider){ loadProvider(); } else { loadPatient(); }

// ================= PATIENT (UNCHANGED) =================
// (keeping your exact patient UI logic as-is)

// ================= PROVIDER =================

function loadProvider(){

fetch("https://script.google.com/macros/s/AKfycbyLSP8Zd8t62-q7iX9mFAJR5LpOsnx4V49YqJGnouRcNlVSbAIjAB5JkJthoFbU8c2k/exec")
.then(res => res.json())
.then(patients => {

if(!patients || patients.length===0){
document.getElementById("app").innerHTML="No patients yet";
return;
}

sheetPatients = patients;

let html="<h2>Patient Queue</h2>";

patients.forEach((p,i)=>{

let name = p.Name || p.name || "No name";
let phone = p.Phone || p.phone || "";
let time = p.Time || p.time || "";

html+=`
<div class="card" onclick="openChart(${i})">
<b>${name}</b><br>
${phone}<br>
${time}
</div>`;
});

document.getElementById("app").innerHTML=html;

});
}

function openChart(i){

currentIndex = i;
let p = sheetPatients[i];

let name = p.Name || p.name || "";
let phone = p.Phone || p.phone || "";
let time = p.Time || p.time || "";
let cc = p.CC || p.cc || "";
let symptoms = p.Symptoms || p.symptoms || "";
let medHx = p.MedHx || p.medHx || "";
let famHx = p.FamHx || p.famHx || "";
let meds = p.Meds || p.meds || "";
let allergies = p.Allergies || p.allergies || "";

document.getElementById("app").innerHTML=`

<div class="print-container">

<h2>Medical Record</h2>

<b>Name:</b> ${name}<br>
<b>Phone:</b> ${phone}<br>
<b>Date:</b> ${time}<br><br>

<div class="soap-section">
<div class="soap-title">S: Subjective</div>
<b>Chief Complaint:</b> ${cc}<br>
<b>Symptoms:</b> ${symptoms}<br>
<b>Medical History:</b> ${medHx}<br>
<b>Family History:</b> ${famHx}<br>
<b>Medications:</b> ${meds}<br>
<b>Allergies:</b> ${allergies}
</div>

<div class="soap-section">
<div class="soap-title">O: Objective</div>
<textarea placeholder="Lids/Lashes, Conj, Cornea, AC, Pupils, EOMs"></textarea>
</div>

<div class="soap-section">
<div class="soap-title">A: Assessment</div>

<select id="icdSelect">
  <option value="">-- Select ICD-10 --</option>
  <option>H10.3 – Acute conjunctivitis</option>
  <option>H10.45 – Chronic allergic conjunctivitis</option>
  <option>H01.00 – Blepharitis</option>
  <option>H00.019 – Hordeolum externum</option>
  <option>H00.029 – Hordeolum internum</option>
  <option>H00.19 – Chalazion</option>
  <option>H04.12 – Dry eye</option>
  <option>H11.3 – Subconjunctival hemorrhage</option>
  <option>H57.1 – Ocular pain</option>
  <option value="other">Other</option>
</select>

<input id="customICD" placeholder="Enter ICD-10" style="display:none;">

<textarea id="assessmentBox" placeholder="Assessment notes"></textarea>
</div>

<div class="soap-section">
<div class="soap-title">P: Plan</div>
<textarea placeholder="Treatment plan"></textarea><br>
<b>Follow-Up:</b><br>
<textarea placeholder="Follow-up instructions"></textarea>
</div>

<div class="signature">
<br><br>
_________________________<br>
<select id="doctorSelect" onchange="updateDoctor()">
  <option value="Emily Zediker, OD">Emily Zediker, OD</option>
  <option value="Sophia Brown, OD">Sophia Brown, OD</option>
</select><br>
<span id="npi"></span>
</div>

<button onclick="window.print()">Print / Save PDF</button>
<button onclick="loadProvider()">Back</button>

</div>
`;

updateDoctor();
}

// ICD auto-fill
document.addEventListener("change", function(e){

if(e.target.id==="icdSelect"){
const box=document.getElementById("assessmentBox");
const custom=document.getElementById("customICD");

if(e.target.value==="other"){
custom.style.display="block";
}else{
custom.style.display="none";
if(box) box.value=e.target.value;
}
}

});

function updateDoctor(){
let d=document.getElementById("doctorSelect").value;
document.getElementById("npi").innerText="NPI: "+providers[d].npi;
}

function join(){
window.location.href="https://doxy.me/YOURROOM";
}

</script>

</body>
</html>
