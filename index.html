let selectedTime = null;

function generateTimeSlots(){

  const container = document.getElementById("timeSlots");
  container.innerHTML = "";

  const now = new Date();
  let allSlots = [];

  // Build ALL future slots
  for(let d = 0; d < 7; d++){

    const date = new Date();
    date.setDate(now.getDate() + d);

    let hours = [];

    // Weekdays
    if(date.getDay() >= 1 && date.getDay() <= 5){
      hours = [18,19,20,21]; // 6–9 PM
    } else {
      // Weekend
      for(let i=8;i<=21;i++){
        hours.push(i);
      }
    }

    hours.forEach(hour => {
      const slot = new Date(date);
      slot.setHours(hour,0,0,0);

      if(slot > now){
        allSlots.push(slot);
      }
    });
  }

  // ✅ SORT by earliest time
  allSlots.sort((a,b)=> a - b);

  // ✅ Display top 12 (optional limit)
  const slotsToShow = allSlots.slice(0, 12);

  slotsToShow.forEach(slot => {

    const dayName = slot.toLocaleDateString("en-US", { weekday: "short" });
    const fullDate = slot.toLocaleDateString("en-US", {
      month: "short",
      day: "numeric"
    });

    let hour = slot.getHours();
    let displayHour = hour > 12 ? hour - 12 : hour;
    let ampm = hour >= 12 ? "PM" : "AM";
let timeLabel = `${displayHour}:00 ${ampm}`;
let fullLabel = `${fullDate} ${timeLabel}`;
let displayLabel = `${dayName} (${fullDate}) - ${timeLabel}`;

// 🔥 NEW — timestamp comparison
const slotTimestamp = slot.getTime();

const now = Date.now();

const match = appointments.find(p =>
  Math.abs(Number(p.appointmentTime) - slotTimestamp) < 60000
);

let isBlocked = false;

if (match) {

  if (match.status === "BOOKED") {
    isBlocked = true;
  }

  if (match.status === "HOLD") {
    const holdTime = new Date(match.submittedAt).getTime();

    if ((now - holdTime) < (5 * 60 * 1000)) {
      isBlocked = true;
    }
  }
}

if (isBlocked) {

  container.innerHTML += `
    <div class="card" style="
      background:#eee;
      color:#888;
      text-decoration:line-through;
      cursor:not-allowed;
    ">
      ${displayLabel}
    </div>
  `;

} else {

  const isSelected = selectedTime === slotTimestamp;

container.innerHTML += `
  <div class="card"
       onclick="selectTime(${slotTimestamp}, this)"
       style="${isSelected ? 'background:#cce5ff;' : ''}">
    ${displayLabel}
  </div>
`;

}
  });
}

async function selectTime(time, el){

  // 🔒 attempt HOLD first
  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: new URLSearchParams({
        action: "hold",
        appointmentTime: time,
        name: patient.name || "HOLD"
      })
    });

    const data = await res.json();

    if(data.status === "taken"){
      alert("That time was just taken. Please select another.");
      loadPatient(); // refresh slots
      return;
    }

  } catch(err){
    alert("Error locking time");
    return;
  }

  // ✅ proceed if held
  selectedTime = time;

  // clear previous selections
  document.querySelectorAll("#timeSlots div").forEach(d=>{
    d.style.background="";
  });

  el.style.background = "#cce5ff";

  // unlock payment
  const payBox = document.getElementById("paymentBox");
  payBox.style.opacity = "1";
  payBox.style.pointerEvents = "auto";
}

  document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));

function showPaidScreen(){

  const last = JSON.parse(localStorage.getItem("lastPatient"));
  const bookedSent = localStorage.getItem("bookedSent");
  const alreadySent = localStorage.getItem("smsSent");

  // 🔥 SEND BOOKING (ONLY ONCE)

    const formData = new URLSearchParams();

    formData.append("action", "book");
    formData.append("name", last.name);
    formData.append("phone", last.phone);
    formData.append("email", last.email);
    formData.append("cc", last.cc);
    formData.append("symptoms", last.symptoms);
    formData.append("medHx", last.medHx);
    formData.append("medHxOther", last.medHxOther);
    formData.append("famHx", last.famHx);
    formData.append("famHxOther", last.famHxOther);

    formData.append("allergies", last.allergies);
    formData.append("appointmentTime", last.appointmentTime);
    formData.append("submittedAt", new Date().toLocaleString());

    fetch(SCRIPT_URL, {
      method: "POST",
      body: formData
    });

    localStorage.setItem("bookedSent", "1");
  }

  // 🔥 SMS (ONLY ONCE)
  if(last && !alreadySent){
    fetch(SCRIPT_URL, {
      method: "POST",
      body: new URLSearchParams({
        action: "sendSMS",
        name: last.name,
        phone: last.phone,
        appointmentTime: last.appointmentTime,

    });

    localStorage.setItem("smsSent", "1");

function loadProvider(){

fetch(SCRIPT_URL)
  .then(res => res.json())
  .then(patients => {

    if(!patients || patients.length === 0){
      document.getElementById("app").innerHTML="No patients yet";
      return;
    }

    window.livePatients = patients.reverse();

    let html="<h2>Patient Queue</h2>";

    window.livePatients
  .filter(p => p.status === "BOOKED")
  .forEach((p,i)=>{
      html+=`
      <div class="card" onclick="openChart(${i})">
      <b>${p.name}</b><br>
      ${p.phone}<br>
      ${new Date(Number(p.appointmentTime)).toLocaleString()}
      </div>`;
    });

    document.getElementById("app").innerHTML=html;

  })
  .catch(()=>{
    document.getElementById("app").innerHTML="Error loading patients";
  });
}

    const custom = document.getElementById("customICD");
    const box = document.getElementById("assessmentBox");

    if(e.target.value === "other"){
      custom.style.display = "block";
      return;
    } else {
      custom.style.display = "none";
    }

    if(e.target.value && box){
      box.value = e.target.value;
    }
  }

});

async function removePatient(index){

  if(!confirm("Are you sure you want to remove this patient?")) return;

  const patient = window.livePatients[index];

  try {
    const res = await fetch(
  `${SCRIPT_URL}?delete=1&appointmentTime=${encodeURIComponent(patient.appointmentTime)}`
);

    const data = await res.json();

    if(data.status === "deleted"){
      alert("Patient removed ✅");
      loadProvider(); // refresh AFTER success
    } else {
      alert("Delete failed ❌");
    }

  } catch(err){
    console.error(err);
    alert("Error deleting patient ❌");
  }
}
