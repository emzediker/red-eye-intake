<!DOCTYPE html>
<html>
<head>
<title>Texas Virtual Eye Care – Red Eye & Stye</title>

<style>
body { font-family: Arial; max-width: 520px; margin: 40px auto; }
h1 { text-align:center; }
.subtitle { text-align:center; color:gray; margin-bottom:20px; }

.step { display:none; }
.active { display:block; }

.check-row {
  display:grid;
  grid-template-columns:20px auto;
  gap:6px;
  margin-bottom:6px;
}

textarea,input,select { width:100%; margin-bottom:12px; padding:8px; }
button { width:100%; padding:12px; margin-top:10px; }

.result { padding:15px; border-radius:8px; }
.green { background:#e6ffe6; }
.red { background:#ffe5e5; }

.card {
  border:1px solid #ccc;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  cursor:pointer;
}

.soap-section { margin-bottom:20px; }
.soap-title { font-weight:bold; border-bottom:1px solid #000; margin-bottom:6px; }
.print-container { max-width:700px; margin:auto; }
.signature { margin-top:40px; }
</style>
</head>

<body>

<h1>Texas Virtual Eye Care</h1>
<p class="subtitle">Telehealth for red eye & lid conditions (Texas only)</p>

<div id="app"></div>

<script>

const providers = {
  "Emily Zediker, OD": { npi: "1790349074" },
  "Sophia Brown, OD": { npi: "1750279949" }
};

let doctorName = "Emily Zediker, OD";
let currentIndex = null;
let sheetPatients = [];

const isProvider = new URLSearchParams(window.location.search).get("provider")==="1";
let patient={};

if(isProvider){ loadProvider(); } else { loadPatient(); }

// ================= PATIENT =================

function loadPatient(){
document.getElementById("app").innerHTML=`

<div class="step active" id="step1">

<div style="background:#f5f5f5;padding:10px;border-radius:6px;margin-bottom:15px;">
This tool helps determine if your condition is appropriate for telehealth.
If you have pain, light sensitivity, or vision loss, you should be seen in person.
</div>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">

<button onclick="validate()">Next</button>
</div>

<div class="step" id="step2">
<p><b>Symptoms</b></p>

${cb("redness","Red eye")}
${cb("itching","Itching")}
${cb("discharge","Discharge")}
${cb("lid","Stye / lid bump")}
${cb("irritation","Irritation")}
${cb("noneSymptoms","None of the above")}

<button onclick="next(3)">Next</button>
</div>

<div class="step" id="step3">
<p><b>Do you have any of the following symptoms?</b></p>

${cb("vision","Vision loss")}
${cb("pain","Severe pain")}
${cb("light","Light sensitivity")}
${cb("trauma","Trauma")}
${cb("chemical","Chemical exposure")}
${cb("cl","Contact lens pain")}
${cb("noneRF","None of the above")}

<button onclick="next(4)">Next</button>
</div>

<div class="step" id="step4">

<textarea id="cc" placeholder="Chief Complaint"></textarea>

<p><b>Medical History</b></p>
${medHx("mh_")}
<input id="mh_other" placeholder="Other medical history">

<p><b>Family History</b></p>
${medHx("fh_")}
<input id="fh_other" placeholder="Other family history">

<textarea id="meds" placeholder="Medications"></textarea>
<input id="allergies" placeholder="Allergies">

<button onclick="submitForm()">Submit</button>
</div>

<div id="result"></div>
`;
}

function cb(id,label){
return `<div class="check-row"><input type="checkbox" id="${id}"><span>${label}</span></div>`;
}

function medHx(prefix){
return `
${cb(prefix+"diabetes","Diabetes")}
${cb(prefix+"htn","Hypertension")}
${cb(prefix+"chol","High cholesterol")}
${cb(prefix+"cancer","Cancer")}
${cb(prefix+"autoimmune","Autoimmune")}
${cb(prefix+"thyroid","Thyroid")}
${cb(prefix+"asthma","Asthma")}
${cb(prefix+"heart","Heart disease")}
${cb(prefix+"none","None")}
`;
}

// ================= FLOW =================

function validate(){
const name=document.getElementById("name").value;
const phone=document.getElementById("phone").value;

if(!name||!phone){alert("Enter info");return;}

patient.name=name;
patient.phone=phone;

next(2);
}

function next(step){

if(step===4){
if(vision.checked||pain.checked||light.checked||trauma.checked||chemical.checked||cl.checked){
document.getElementById("app").innerHTML="<div class='result red'>🚫 In-person care recommended</div>";
return;
}}

document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
document.getElementById("step"+step).classList.add("active");
}

// ================= SAVE =================

function submitForm(){

let symptoms=[];
if(redness.checked) symptoms.push("Red eye");
if(itching.checked) symptoms.push("Itching");
if(discharge.checked) symptoms.push("Discharge");
if(lid.checked) symptoms.push("Stye");
if(irritation.checked) symptoms.push("Irritation");

function collect(prefix){
let arr=[];
["diabetes","htn","chol","cancer","autoimmune","thyroid","asthma","heart"].forEach(x=>{
if(document.getElementById(prefix+x).checked){arr.push(x);}
});
return arr;
}

const newPatient={
name:patient.name,
phone:patient.phone,
cc:cc.value,
symptoms:symptoms,
medHx:collect("mh_"),
medHxOther:mh_other.value,
famHx:collect("fh_"),
famHxOther:fh_other.value,
meds:meds.value,
allergies:allergies.value,
time:new Date().toLocaleString()
};

// KEEP LOCAL STORAGE
let all = JSON.parse(localStorage.getItem("patients")) || [];
all.push(newPatient);
localStorage.setItem("patients", JSON.stringify(all));

// SEND TO GOOGLE SHEETS
fetch("https://script.google.com/macros/s/AKfycbyLSP8Zd8t62-q7iX9mFAJR5LpOsnx4V49YqJGnouRcNlVSbAIjAB5JkJthoFbU8c2k/exec", {
  method: "POST",
  body: JSON.stringify({
    name: patient.name,
    phone: patient.phone,
    cc: cc.value,
    symptoms: symptoms.join(", "),
    medHx: collect("mh_").join(", "),
    famHx: collect("fh_").join(", "),
    meds: meds.value,
    allergies: allergies.value
  })
});

document.getElementById("app").innerHTML=`
<div class="result green">
✅ You may proceed<br><br>
<button onclick="join()">Join Visit</button>
</div>`;
}

// ================= PROVIDER =================

function loadProvider(){

fetch("https://script.google.com/macros/s/AKfycbyLSP8Zd8t62-q7iX9mFAJR5LpOsnx4V49YqJGnouRcNlVSbAIjAB5JkJthoFbU8c2k/exec")
.then(res => res.json())
.then(patients => {

console.log("RAW DATA:", patients);

if(!patients || patients.length===0){
document.getElementById("app").innerHTML="No patients yet";
return;
}

sheetPatients = patients;

let html="<h2>Patient Queue</h2>";

patients.forEach((p,i)=>{

let name = p.Name || p.name || "No name";
let phone = p.Phone || p.phone || "";
let time = p.Time || p.time || "";

html+=`
<div class="card" onclick="openChart(${i})">
<b>${name}</b><br>
${phone}<br>
${time}
</div>`;
});

document.getElementById("app").innerHTML=html;

})
.catch(err=>{
console.error("FETCH ERROR:", err);
document.getElementById("app").innerHTML="Error loading patients";
});
}

function openChart(i){

currentIndex = i;
let p = sheetPatients[i];

let name = p.Name || p.name || "";
let phone = p.Phone || p.phone || "";
let time = p.Time || p.time || "";
let cc = p.CC || p.cc || "";
let symptoms = p.Symptoms || p.symptoms || "";
let medHx = p.MedHx || p.medHx || "";
let famHx = p.FamHx || p.famHx || "";
let meds = p.Meds || p.meds || "";
let allergies = p.Allergies || p.allergies || "";

document.getElementById("app").innerHTML=`

<h2>Medical Record</h2>

<b>Name:</b> ${name}<br>
<b>Phone:</b> ${phone}<br>
<b>Date:</b> ${time}<br><br>

<div class="soap-section">
<div class="soap-title">S: Subjective</div>
<b>Chief Complaint:</b> ${cc}<br>
<b>Symptoms:</b> ${symptoms}<br>
<b>Medical History:</b> ${medHx}<br>
<b>Family History:</b> ${famHx}<br>
<b>Medications:</b> ${meds}<br>
<b>Allergies:</b> ${allergies}
</div>

<button onclick="window.print()">Print</button>
<button onclick="loadProvider()">Back</button>
`;
}

function join(){
window.location.href="https://doxy.me/YOURROOM";
}

</script>

</body>
</html>
