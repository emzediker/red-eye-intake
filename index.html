
<!DOCTYPE html>
<html>
<head>
<title>Texas Virtual Eye Care – Red Eye & Stye</title>

<style>
body { font-family: Arial; max-width: 520px; margin: 40px auto; }
h1 { text-align:center; }
.subtitle { text-align:center; color:gray; margin-bottom:20px; }

.step { display:none; }
.active { display:block; }

.check-row {
  display:grid;
  grid-template-columns:20px auto;
  gap:6px;
  margin-bottom:6px;
}

textarea,input,select { width:100%; margin-bottom:12px; padding:8px; }
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button:active {
  opacity:0.8;
}
.result { padding:15px; border-radius:8px; }
.green { background:#e6ffe6; }
.red { background:#ffe5e5; }

.card {
  border:1px solid #ccc;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  cursor:pointer;
}

.soap-section { margin-bottom:20px; }
.soap-title { font-weight:bold; border-bottom:1px solid #000; margin-bottom:6px; }
.print-container { max-width:700px; margin:auto; }
.signature { margin-top:40px; }
</style>
</head>

<body>

<h1>Texas Virtual Eye Care</h1>
<p class="subtitle">Telehealth for red eye & lid conditions (Texas only)</p>

<div id="app"></div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxZbv6mpRMGe3xeIjJIniUOI-J2IMuc174h7JcPPy9bW2-SaJccMOR-QyffhzyI02OP/exec";
  
const providers = {
  "Emily Zediker, OD": { npi: "1790349074" },
  "Sophia Brown, OD": { npi: "1750279949" }
};

let doctorName = "Emily Zediker, OD";
let currentIndex = null;

const isProvider = new URLSearchParams(window.location.search).get("provider")==="1";
let patient={};
let paid = new URLSearchParams(window.location.search).get("paid") === "1";
if(isProvider){
  loadProvider();
} else {

  loadPatient();



}

// ================= PATIENT =================

function loadPatient(){
document.getElementById("app").innerHTML=`

<div class="step active" id="step0">

<h3>Telehealth Consent</h3>

<div style="background:#fff3cd;padding:12px;border-radius:6px;margin-bottom:15px;font-size:14px;">

<b>Telehealth Terms & Conditions</b><br><br>

<div style="max-height:200px;overflow-y:auto;">

This is a telehealth screening service and not a full in-person eye exam.

You confirm you are physically located in Texas.

This service is not for emergencies. If you have severe pain, vision loss, or trauma, seek immediate care.

A licensed optometrist will review your information, but some conditions cannot be fully diagnosed via telehealth.

The cost of this visit is $25. If your condition requires in-person care and no treatment is provided, you may be eligible for a refund.

No guarantees are made regarding diagnosis or outcomes.

Your information will be handled in accordance with applicable privacy standards. Electronic communication carries some risk.

You consent to evaluation and treatment via telehealth.

<br><br>

If you have a complaint, contact:

Texas Optometry Board  
333 Guadalupe St, Suite 2-420  
Austin, TX 78701  
(512) 305-8500  
https://tob.texas.gov

</div>

<div class="check-row">
<input type="checkbox" id="consentMain">
<span>
I consent to receive SMS messages from <b>Dr. Emily Zediker, Optometrist</b> related to my appointment and care. 
Message frequency varies. Message & data rates may apply. 
Reply STOP to opt out, HELP for help. 
These messages are not for marketing or promotional purposes. 
I agree to the 
<a href="privacy.html" target="_blank">Privacy Policy</a> and 
<a href="terms.html" target="_blank">Terms & Conditions</a>.
</span>
</div>

<button onclick="startIntake()">Continue</button>

</div>
</div>

<div id="paymentModal" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:9999;
  align-items:center;
  justify-content:center;
">

  <div style="
    background:white;
    padding:20px;
    border-radius:8px;
    text-align:center;
    max-width:300px;
  ">
    <h3>Redirecting to Secure Payment</h3>
    <p>For your security, you are being redirected to our secure payment provider.</p>
  </div>

</div>

<div class="step" id="step1">

<div style="background:#f5f5f5;padding:10px;border-radius:6px;margin-bottom:15px;">
This tool helps determine if your condition is appropriate for telehealth.
If you have pain, light sensitivity, or vision loss, you should be seen in person.
</div>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">

<button onclick="validate()">Next</button>
</div>

<div class="step" id="step2">
<p><b>Symptoms</b></p>

${cb("redness","Red eye")}
${cb("itching","Itching")}
${cb("discharge","Discharge")}
${cb("lid","Stye / lid bump")}
${cb("irritation","Irritation")}
${cb("noneSymptoms","None of the above")}

<button onclick="next(3)">Next</button>
</div>

<div class="step" id="step3">
<p><b>Do you have any of the following symptoms?</b></p>

${cb("vision","Vision loss")}
${cb("pain","Severe pain")}
${cb("light","Light sensitivity")}
${cb("trauma","Trauma")}
${cb("chemical","Chemical exposure")}
${cb("cl","Contact lens pain")}
${cb("noneRF","None of the above")}

<button onclick="next(4)">Next</button>
</div>

<div class="step" id="step4">

<textarea id="cc" placeholder="Chief Complaint"></textarea>

<p><b>Medical History</b></p>
${medHx("mh_")}
<input id="mh_other" placeholder="Other medical history">

<p><b>Family History</b></p>
${medHx("fh_")}
<input id="fh_other" placeholder="Other family history">

<textarea id="meds" placeholder="Medications"></textarea>
<input id="allergies" placeholder="Allergies">

<button onclick="next(5)">Continue to Payment</button>
</div>

<div class="step" id="step5">

<h3>Select Appointment Time</h3>

<div id="timeSlots"></div>

<br>

<h3>Payment</h3>

<div id="paymentBox" style="opacity:0.5; pointer-events:none;">

  <p><b>$25 Telehealth Visit</b></p>

<button onclick="handlePayment()">Pay & Continue</button>

</div>

</div>

<div id="result"></div>
`;

setTimeout(generateTimeSlots, 100);
}

function handlePayment(){

  if(!selectedTime){
    alert("Please select a time first");
    return;
  }

  submitForm();

  const temp = JSON.parse(localStorage.getItem("pendingPatient")) || {};
  temp.selectedTime = selectedTime;
  localStorage.setItem("pendingPatient", JSON.stringify(temp));

  const modal = document.getElementById("paymentModal");
  modal.style.display = "flex";

  // Try redirect
  setTimeout(() => {
    window.location.href = "https://buy.stripe.com/28E5kDbR1bb1eSpdiW2cg02";
  }, 1000);

  // 🚨 FAILSAFE (if redirect doesn't happen)
  setTimeout(() => {
    modal.innerHTML = `
      <div style="background:white;padding:20px;border-radius:8px;text-align:center;">
        <h3>Payment didn’t load</h3>
        <p>Please tap below to continue.</p>
        <button onclick="window.location.href='https://buy.stripe.com/28E5kDbR1bb1eSpdiW2cg02'">
          Continue to Payment
        </button>
      </div>
    `;
  }, 4000);

}
  
function cb(id,label){
return `<div class="check-row"><input type="checkbox" id="${id}"><span>${label}</span></div>`;
}

function medHx(prefix){
return `
${cb(prefix+"diabetes","Diabetes")}
${cb(prefix+"htn","Hypertension")}
${cb(prefix+"chol","High cholesterol")}
${cb(prefix+"cancer","Cancer")}
${cb(prefix+"autoimmune","Autoimmune")}
${cb(prefix+"thyroid","Thyroid")}
${cb(prefix+"asthma","Asthma")}
${cb(prefix+"heart","Heart disease")}
${cb(prefix+"none","None")}
`;
}

let selectedTime = null;

function generateTimeSlots(){

  const container = document.getElementById("timeSlots");
  container.innerHTML = "";

  const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

  days.forEach((day, index)=>{

    let times = [];

    // Weekdays
    if(index < 5){
      times = ["6:00 PM","7:00 PM","8:00 PM","9:00 PM"];
    } else {
      // Weekend
      for(let i=8;i<=21;i++){
        let hour = i > 12 ? i-12 : i;
        let ampm = i >= 12 ? "PM" : "AM";
        times.push(hour + ":00 " + ampm);
      }
    }

    let html = `<div class="card"><b>${day}</b><br>`;

    times.forEach(t=>{
      html += `<div onclick="selectTime('${day} ${t}', this)" style="padding:6px;border:1px solid #ccc;margin:4px;cursor:pointer;">${t}</div>`;
    });

    html += `</div>`;

    container.innerHTML += html;

  });

}

function selectTime(time, el){

  selectedTime = time;

  // clear previous selections
  document.querySelectorAll("#timeSlots div").forEach(d=>{
    d.style.background="";
  });

  el.style.background = "#cce5ff";

  // unlock payment
  const payBox = document.getElementById("paymentBox");
  payBox.style.opacity = "1";
  payBox.style.pointerEvents = "auto";

}
// ================= FLOW =================

function validate(){
const name=document.getElementById("name").value;
const phone=document.getElementById("phone").value;

if(!name||!phone){alert("Enter info");return;}

patient.name=name;
patient.phone=phone;

next(2);
}

function next(step){

  if(step===4){
    if(vision.checked||pain.checked||light.checked||trauma.checked||chemical.checked||cl.checked){
      document.getElementById("app").innerHTML="<div class='result red'>🚫 In-person care recommended</div>";
      return;
    }
  }

  document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
  document.getElementById("step"+step).classList.add("active");
}

function startIntake(){

const consent = document.getElementById("consentMain");

if(!consent.checked){
alert("You must agree to the Terms & Conditions to continue.");
return;
}

document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
document.getElementById("step1").classList.add("active");
}
// ================= SAVE =================

function submitForm(){



let symptoms=[];
if(redness.checked) symptoms.push("Red eye");
if(itching.checked) symptoms.push("Itching");
if(discharge.checked) symptoms.push("Discharge");
if(lid.checked) symptoms.push("Stye");
if(irritation.checked) symptoms.push("Irritation");

function collect(prefix){
let arr=[];
["diabetes","htn","chol","cancer","autoimmune","thyroid","asthma","heart"].forEach(x=>{
if(document.getElementById(prefix+x).checked){arr.push(x);}
});
return arr;
}

const newPatient={
name: patient.name,
phone: patient.phone,
cc: document.getElementById("cc").value,
symptoms: symptoms,
medHx: collect("mh_"),
medHxOther: document.getElementById("mh_other").value,
famHx: collect("fh_"),
famHxOther: document.getElementById("fh_other").value,
meds: document.getElementById("meds").value,
allergies: document.getElementById("allergies").value,
time: new Date().toLocaleString(),
selectedTime: selectedTime,
};

// KEEP LOCAL STORAGE
let all = JSON.parse(localStorage.getItem("patients")) || [];
all.push(newPatient);
localStorage.setItem("patients", JSON.stringify(all));

// ✅ SEND TO GOOGLE SHEETS
const formData = new URLSearchParams();

formData.append("name", patient.name);
formData.append("phone", patient.phone);
formData.append("cc", document.getElementById("cc").value);
formData.append("symptoms", symptoms.join(", "));
formData.append("medHx", collect("mh_").join(", "));
formData.append("medHxOther", document.getElementById("mh_other").value);
formData.append("famHx", collect("fh_").join(", "));
formData.append("famHxOther", document.getElementById("fh_other").value);
formData.append("meds", document.getElementById("meds").value);
formData.append("allergies", document.getElementById("allergies").value);
formData.append("selectedTime", selectedTime);

fetch(SCRIPT_URL, {
  method: "POST",
  body: formData
})
.then(res => res.text())
.then(data => {
  console.log("SUCCESS:", data);
})
.catch(err => {
  console.error("ERROR:", err);
});
  
}

  function saveBeforePayment(){

let symptoms=[];
if(redness.checked) symptoms.push("Red eye");
if(itching.checked) symptoms.push("Itching");
if(discharge.checked) symptoms.push("Discharge");
if(lid.checked) symptoms.push("Stye");
if(irritation.checked) symptoms.push("Irritation");

function collect(prefix){
let arr=[];
["diabetes","htn","chol","cancer","autoimmune","thyroid","asthma","heart"].forEach(x=>{
if(document.getElementById(prefix+x).checked){arr.push(x);}
});
return arr;
}

const tempData={
name:patient.name,
phone:patient.phone,
cc:cc.value,
symptoms:symptoms,
medHx:collect("mh_"),
medHxOther:mh_other.value,
famHx:collect("fh_"),
famHxOther:fh_other.value,
meds:meds.value,
allergies:allergies.value,
selectedTime: selectedTime
};

localStorage.setItem("pendingPatient", JSON.stringify(tempData));

}

function goToSchedule(){

  saveBeforePayment();

  window.location.href = "https://calendly.com/emzediker/30min";

}
  

// ================= PROVIDER =================

function loadProvider(){

fetch(SCRIPT_URL)
  .then(res => res.json())
  .then(patients => {

    if(!patients || patients.length === 0){
      document.getElementById("app").innerHTML="No patients yet";
      return;
    }

    window.livePatients = patients.reverse();

    let html="<h2>Patient Queue</h2>";

    window.livePatients.forEach((p,i)=>{
      html+=`
      <div class="card" onclick="openChart(${i})">
      <b>${p.name}</b><br>
      ${p.phone}<br>
      ${p.time}
      </div>`;
    });

    document.getElementById("app").innerHTML=html;

  })
  .catch(()=>{
    document.getElementById("app").innerHTML="Error loading patients";
  });
}

function openChart(i){

currentIndex = i;

let p = window.livePatients[i];

let cleanName = p.name.replace(/\s+/g, "_");
let date = new Date().toISOString().split("T")[0];
document.title = cleanName + "_" + date;

let doctorSelector = `
<label><b>Select Provider:</b></label>
<select id="doctorSelect" onchange="updateDoctor()">
  <option value="Emily Zediker, OD">Emily Zediker, OD</option>
  <option value="Sophia Brown, OD">Sophia Brown, OD</option>
</select><br><br>
`;

document.getElementById("app").innerHTML=`

${doctorSelector}

<div class="print-container">

<h2>Medical Record</h2>

<b>Name:</b> ${p.name}<br>
<b>Phone:</b> ${p.phone}<br>
<b>Date:</b> ${p.time}<br><br>

<div class="soap-section">
<div class="soap-title">S: Subjective</div>
<b>Chief Complaint:</b> ${p.cc}<br>
<b>Symptoms:</b> ${p.symptoms}<br>
<b>Medical History:</b> ${p.medHx}<br>
<b>Other:</b> ${p.medHxOther || "None"}<br>
<b>Family History:</b> ${p.famHx}<br>
<b>Other:</b> ${p.famHxOther || "None"}<br>
<b>Medications:</b> ${p.meds}<br>
<b>Allergies:</b> ${p.allergies}
</div>

<div class="soap-section">
<div class="soap-title">O: Objective</div>
Telehealth evaluation
</div>

<div class="soap-section">
<div class="soap-title">A: Assessment</div>

<select id="icdSelect">
  <option value="">-- Select ICD-10 --</option>
  <option>H10.3 – Acute conjunctivitis</option>
  <option>H10.45 – Chronic allergic conjunctivitis</option>
  <option>H01.00 – Blepharitis</option>
  <option>H00.019 – Hordeolum externum</option>
  <option>H00.029 – Hordeolum internum</option>
  <option>H00.19 – Chalazion</option>
  <option>H04.12 – Dry eye</option>
  <option>H11.3 – Subconjunctival hemorrhage</option>
  <option>H57.1 – Ocular pain</option>
  <option value="other">Other</option>
</select>

<input id="customICD" placeholder="Enter ICD-10" style="display:none;">

<textarea id="assessmentBox" placeholder="Assessment notes"></textarea>
</div>

<div class="soap-section">
<div class="soap-title">P: Plan</div>
<textarea></textarea><br>
<b>Follow-Up:</b><br>
<textarea></textarea>
</div>

<div class="signature">
<br><br>
_________________________<br>
${doctorName}<br>
NPI: ${providers[doctorName].npi}
</div>

<button onclick="window.print()">Print / Save PDF</button>
<button onclick="removePatient(${i})">Remove Patient</button>

</div>
`;
}

document.addEventListener("change", function(e){

  if(e.target && e.target.id === "icdSelect"){

    const custom = document.getElementById("customICD");
    const box = document.getElementById("assessmentBox");

    if(e.target.value === "other"){
      custom.style.display = "block";
      return;
    } else {
      custom.style.display = "none";
    }

    if(e.target.value && box){
      box.value = e.target.value;
    }
  }

});

function updateDoctor(){
  doctorName = document.getElementById("doctorSelect").value;
  openChart(currentIndex);
}

function removePatient(index){

  if(!confirm("Are you sure you want to remove this patient?")) return;

  const patient = window.livePatients[index];

  fetch(SCRIPT_URL + "?delete=1&name=" + encodeURIComponent(patient.name), {
    method: "GET",
    
  });

  loadProvider();
}

function join(){
window.location.href="https://doxy.me/drzediker";
}

</script>

</body>
</html>
